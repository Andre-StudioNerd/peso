<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peso Conversor</title>
    <link rel="icon" href="img/peso.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="heading">Peso Conversor</h1>
      <div class="input-container">
        <label for="pounds">Kgs:</label>
        <input
          type="number"
          id="input"
          class="input"
          step=".1"
          placeholder="Digite seu peso"
        />
      </div>
      <p>
        Seu peso em Libras:
        <span id="result"></span>
      </p>
      <p class="error" id="error"></p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
